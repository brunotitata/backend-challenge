services:
  postgres:
    image: postgres:16-alpine
    container_name: trace-challenge
    environment:
      POSTGRES_DB: payment_api
      POSTGRES_USER: payment_api
      POSTGRES_PASSWORD: payment_api
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_api -d payment_api"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
