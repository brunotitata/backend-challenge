services:
  postgres:
    image: postgres:16-alpine
    container_name: trace-challenge-postgres
    environment:
      POSTGRES_DB: payment_api
      POSTGRES_USER: payment_api
      POSTGRES_PASSWORD: payment_api
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_api -d payment_api"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: trace-challenge-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: payment
      RABBITMQ_DEFAULT_PASS: payment
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trace-challenge-app
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/payment_api
      DATABASE_USER: payment_api
      DATABASE_PASSWORD: payment_api
      PORT: 8080
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: payment
      RABBITMQ_PASS: payment
      RABBITMQ_EXCHANGE: payment.events
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres-data:
